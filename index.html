<body>

<div class="container">
  <div class="header">
    <div class="logo">Enter.Pro</div>
    <div class="subtitle">Credits 充值申请</div>
  </div>

  <div class="card">
    <h2>📝 填写充值申请</h2>

    <form id="applicationForm" novalidate>
      <div class="form-group">
        <label>邮箱地址 <span class="required">*</span></label>
        <input type="email" id="email" placeholder="yourname@enter.pro" autocomplete="email">
        <div class="error-msg" id="emailError">请输入有效的邮箱地址</div>
      </div>

      <div class="form-group">
        <label>名称 <span class="required">*</span></label>
        <input type="text" id="name" placeholder="请输入你的姓名或昵称" maxlength="20">
        <div class="char-count" id="nameCount">0 / 20</div>
        <div class="error-msg" id="nameError">请输入名称（最多20个字符，支持中英文）</div>
      </div>

      <div class="form-group">
        <label>所学课程 <span class="required">*</span></label>
        <select id="course">
          <option value="">请选择课程</option>
          <option value="AI Coding 基础入门">AI Coding 基础入门</option>
          <option value="AI 辅助编程实战">AI 辅助编程实战</option>
          <option value="Cursor 高效开发指南">Cursor 高效开发指南</option>
          <option value="GitHub Copilot 进阶应用">GitHub Copilot 进阶应用</option>
          <option value="AI 代码审查与优化">AI 代码审查与优化</option>
          <option value="AI Coding 全栈项目实战">AI Coding 全栈项目实战</option>
        </select>
        <div class="error-msg" id="courseError">请选择所学课程</div>
      </div>

      <div class="button-group">
        <button type="button" class="btn btn-outline" id="resetBtn">🔄 重填</button>
        <button type="submit" class="btn btn-primary" id="submitBtn" disabled>
          提交申请
        </button>
      </div>
    </form>
  </div>
</div>

<script>
(function() {
  const form = document.getElementById('applicationForm');
  const emailInput = document.getElementById('email');
  const nameInput = document.getElementById('name');
  const courseSelect = document.getElementById('course');
  const submitBtn = document.getElementById('submitBtn');
  const resetBtn = document.getElementById('resetBtn');
  const nameCount = document.getElementById('nameCount');

  // Email validation
  function isValidEmail(email) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
  }

  // Show/hide error
  function showError(fieldId, show) {
    const errorEl = document.getElementById(fieldId + 'Error');
    const inputEl = document.getElementById(fieldId);
    if (show) {
      errorEl.classList.add('show');
      inputEl.classList.add('error');
    } else {
      errorEl.classList.remove('show');
      inputEl.classList.remove('error');
    }
  }

  // Validate all fields
  function validateForm() {
    let valid = true;

    // Email
    if (!emailInput.value.trim() || !isValidEmail(emailInput.value.trim())) {
      showError('email', true);
      valid = false;
    } else {
      showError('email', false);
    }

    // Name
    if (!nameInput.value.trim() || nameInput.value.trim().length > 20) {
      showError('name', true);
      valid = false;
    } else {
      showError('name', false);
    }

    // Course
    if (!courseSelect.value) {
      showError('course', true);
      valid = false;
    } else {
      showError('course', false);
    }

    submitBtn.disabled = !valid;
    return valid;
  }

  // Character count
  nameInput.addEventListener('input', function() {
    nameCount.textContent = nameInput.value.length + ' / 20';
    validateForm();
  });

  emailInput.addEventListener('input', validateForm);
  courseSelect.addEventListener('change', validateForm);

  // Show toast
  function showToast(message, type) {
    const existing = document.querySelector('.toast');
    if (existing) existing.remove();
    const toast = document.createElement('div');
    toast.className = 'toast ' + type;
    toast.textContent = message;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
  }

  // Handle submit
  form.addEventListener('submit', async function(e) {
    e.preventDefault();
    if (!validateForm()) return;

    submitBtn.disabled = true;
    submitBtn.innerHTML = '<span class="loading-spinner"></span> 提交中...';

    try {
      const { data, error } = await supabase
        .from('applications')
        .insert([{
          email: emailInput.value.trim(),
          name: nameInput.value.trim(),
          course: courseSelect.value
        }])
        .select('id')
        .single();

      if (error) throw error;

      showToast('申请提交成功！', 'success');
      setTimeout(() => {
        window.location.href = 'result.html?id=' + data.id;
      }, 800);
    } catch (err) {
      showToast('提交失败：' + err.message, 'error');
      submitBtn.disabled = false;
      submitBtn.textContent = '提交申请';
    }
  });

  // Handle reset
  resetBtn.addEventListener('click', function() {
    form.reset();
    document.querySelectorAll('.error-msg').forEach(el => el.classList.remove('show'));
    document.querySelectorAll('input.error, select.error').forEach(el => el.classList.remove('error'));
    nameCount.textContent = '0 / 20';
    submitBtn.disabled = true;
  });
})();
</script>
</body>
