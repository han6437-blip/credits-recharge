<style>
:root {
  --primary: #4f46e5;
  --primary-hover: #4338ca;
  --danger: #ef4444;
  --bg: #f1f5f9;
  --card-bg: #ffffff;
  --text: #1e293b;
  --text-secondary: #64748b;
  --border: #e2e8f0;
  --radius: 12px;
  --shadow-lg: 0 10px 25px rgba(0,0,0,0.08);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.login-card {
  background: var(--card-bg);
  border-radius: 16px;
  box-shadow: var(--shadow-lg);
  padding: 40px 32px;
  width: 100%;
  max-width: 400px;
}

.login-header {
  text-align: center;
  margin-bottom: 32px;
}

.login-header .icon {
  width: 56px;
  height: 56px;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 16px;
  font-size: 24px;
  color: #fff;
}

.login-header h1 {
  font-size: 20px;
  font-weight: 700;
  color: var(--text);
}

.login-header p {
  font-size: 13px;
  color: var(--text-secondary);
  margin-top: 4px;
}

.form-group {
  margin-bottom: 20px;
}

.form-group label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 6px;
}

.form-group input {
  width: 100%;
  padding: 11px 14px;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  font-size: 14px;
  color: var(--text);
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  font-family: inherit;
}

.form-group input:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(79,70,229,0.1);
}

.error-message {
  background: #fef2f2;
  border: 1px solid #fecaca;
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 13px;
  color: #991b1b;
  margin-bottom: 20px;
  display: none;
  text-align: center;
}

.error-message.show {
  display: block;
}

.btn-login {
  width: 100%;
  padding: 12px;
  background: var(--primary);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  font-family: inherit;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.btn-login:hover:not(:disabled) {
  background: var(--primary-hover);
  transform: translateY(-1px);
}

.btn-login:disabled {
  opacity: 0.45;
  cursor: not-allowed;
}

.spinner {
  width: 16px; height: 16px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

.back-link {
  text-align: center;
  margin-top: 20px;
}

.back-link a {
  color: var(--text-secondary);
  text-decoration: none;
  font-size: 13px;
  transition: color 0.2s;
}

.back-link a:hover {
  color: var(--primary);
}
</style>
</head>
<body>

<div class="login-card">
  <div class="login-header">
    <div class="icon">🛡️</div>
    <h1>充值管理后台</h1>
    <p>请使用管理员账号登录</p>
  </div>

  <div class="error-message" id="errorMsg"></div>

  <form id="loginForm">
    <div class="form-group">
      <label>邮箱</label>
      <input type="email" id="email" placeholder="admin@enter.pro" autocomplete="email" required>
    </div>

    <div class="form-group">
      <label>密码</label>
      <input type="password" id="password" placeholder="请输入密码" autocomplete="current-password" required>
    </div>

    <button type="submit" class="btn-login" id="loginBtn">
      登 录
    </button>
  </form>

  <div class="back-link">
    <a href="../index.html">← 返回学员申请页</a>
  </div>
</div>

<script>
(function() {
  const form = document.getElementById('loginForm');
  const loginBtn = document.getElementById('loginBtn');
  const errorMsg = document.getElementById('errorMsg');

  // Check if already logged in
  async function checkSession() {
    const { data: { session } } = await supabase.auth.getSession();
    if (session) {
      window.location.href = 'dashboard.html';
    }
  }
  checkSession();

  function showError(msg) {
    errorMsg.textContent = msg;
    errorMsg.classList.add('show');
    setTimeout(() => errorMsg.classList.remove('show'), 4000);
  }

  form.addEventListener('submit', async function(e) {
    e.preventDefault();

    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    if (!email || !password) {
      showError('请输入邮箱和密码');
      return;
    }

    loginBtn.disabled = true;
    loginBtn.innerHTML = '<span class="spinner"></span> 登录中...';

    try {
      const { data, error } = await supabase.auth.signInWithPassword({
        email: email,
        password: password
      });

      if (error) {
        if (error.message.includes('Invalid login credentials')) {
          showError('邮箱或密码错误，请重试');
        } else if (error.message.includes('Email not confirmed')) {
          showError('邮箱尚未确认，请先确认邮箱');
        } else {
          showError('登录失败：' + error.message);
        }
        loginBtn.disabled = false;
        loginBtn.textContent = '登 录';
        return;
      }

      // Login success
      window.location.href = 'dashboard.html';
    } catch (err) {
      showError('网络错误：' + err.message);
      loginBtn.disabled = false;
      loginBtn.textContent = '登 录';
    }
  });
})();
</script>
</body>
</html>
